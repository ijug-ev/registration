services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: registration
      POSTGRES_PASSWORD: Rg1str4t10n
    ports:
      - "5432:5432"
    restart: always

  application:
    image: ghcr.io/ijug-ev/registration:latest
    depends_on:
      - database
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://database:5432/registration
      QUARKUS_DATASOURCE_USERNAME: registration
      QUARKUS_DATASOURCE_PASSWORD: Rg1str4t10n
      QUARKUS_MAILER_FROM: test@ijug.eu
      QUARKUS_MAILER_HOST: localhost
      QUARKUS_MAILER_PORT: 25
      QUARKUS_OIDC_AUTH_SERVER_URL: https://id.ijug.eu/realms/ijug
      QUARKUS_OIDC_CLIENT_ID: registration
      QUARKUS_OIDC_CREDENTIALS_SECRET: changeme
    ports:
      - "8080:8080"
    restart: always
