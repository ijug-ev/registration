quarkus.devservices.enabled=true

quarkus.native.container-build=true
quarkus.native.container-runtime=docker

quarkus.mailer.from=test@example.com
quarkus.mailer.host=localhost
quarkus.mailer.port=1025

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=user
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/registration_db
quarkus.hibernate-orm.multitenant=DISCRIMINATOR
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.active=true
quarkus.flyway.migrate-at-start=true

quarkus.oidc.application-type=web-app
%prod.quarkus.oidc.auth-server-url=https://id.ijug.eu/realms/ijug
quarkus.oidc.client-id=registration
quarkus.oidc.credentials.secret=secret
quarkus.oidc.roles.role-claim-path=resource_access/registration/roles
quarkus.oidc.authentication.pkce-required=true
quarkus.oidc.authentication.redirect-path=/oidc/callback
quarkus.oidc.authentication.restore-path-after-redirect=true
#quarkus.oidc.logout.path=/logout
#quarkus.oidc.logout.post-logout-path=/index.html

quarkus.keycloak.devservices.realm-path=ijug-realm.json
quarkus.keycloak.devservices.port=8081

# APP specific config values

app.email.from=JUG Darmstadt <info@jug-da.de>
app.email.subject-prefix=JUG DA

app.events.json-url=https://www.jug-da.de/events.json
app.events.data-bucket=jugda
app.events.data-key=registration/jugda/eventData.json

app.tenant.id=jugda
app.tenant.name=JUG Darmstadt
app.tenant.base-url=https://registration.jug-da.de
app.tenant.privacy=https://www.jug-da.de/datenschutz/
app.tenant.imprint=https://www.jug-da.de/impressum/
app.tenant.logo=https://www.jug-da.de/images/jugda_logo_rund.png
app.tenant.website=https://www.jug-da.de
app.tenant.youtube=https://youtube.com/channel/UC80eo8qsCItOcXe92-ECi0A

app.page.registration.name=Ohne Deinen Namen wissen wir nicht, wer Du bist. Wenn Du Dich anmeldest und wir eine Verlosung durchführen, nimmst Du automatisch an dieser teil. Wirst Du als Gewinner gezogen, wird Dein Name während der Veranstaltung bekanntgegeben.
app.page.registration.email=Deine E-Mail Adresse nutzen wir, um die Eindeutigkeit Deiner Anmeldung zu bestimmen. Außerdem kannst Du Dich mithilfe Deiner E-Mail Adresse wieder abmelden bzw. Deine Daten löschen (Link s.u.). Du erhälst zusätzlich eine E-Mail als Anmeldebestätigung, in der auch ein Abmeldelink enthalten ist. Im Falle von evtl. Veranstaltungsänderungen, schicken wir Dir ggf. eine E-Mail, um Dich darüber zu informieren.
app.page.registration.video=Sofern ich nicht möchte, dass mein Bild, meine Stimme oder mein Name aufgenommen werden, treffe ich bestimmte Vorkehrungen (z.B. Kamera/Mikrofon ausschalten, Synonym als Name angeben, etc.)
app.page.registration.disclaimer=Mit Deiner Anmeldung bestätigst Du, dass Du die Hinweise an den Eingabefeldern gelesen und verstanden hast und Du damit einverstanden bist. Wir geben Deine persönlichen Daten aus dieser Anmeldung grundsätzlich nicht weiter und löschen diese ca. 1 Woche nach der Veranstaltung.
app.page.registration.waitlist=Für diese Veranstaltung sind zur Zeit alle verfügbaren Plätze belegt. Du kannst Dich aber auf der Warteliste eintragen. Wir informieren Dich dann, wenn wir Dich auf die Teilnehmerliste setzen können.
app.page.webinar.tools=Wir nutzen für Videokonferenzen und Online-Meetings die Plattform von Zoom Video Communications, Inc. Mit Eurer Einwahl in das Zoom-Meeting akzeptiert Ihr unsere Datenschutzbedingungen zu Zoom-Videokonferenzen: <a href="${app.tenant.privacy}#zoom-videokonferenzen" target="_blank">${app.tenant.privacy}#zoom-videokonferenzen</a>
app.page.webinar.communication=Die Besonderheit ist, dass Ihr alle Kamera und Mikrofon einschalten könnt, so dass wir vor, während und nach dem Vortrag möglichst einfach miteinander kommunizieren können.
app.page.webinar.recording=Wir zeichnen den Vortrag auf und veröffentlichen diesen später auf unserem <a href="${app.tenant.youtube}?sub_confirmation=1" target="_blank">YouTube Kanal</a> (diesen dürft Ihr gerne abonnieren und ein paar 👍&nbsp; da lassen).
app.page.webinar.recording-privacy-hint=Bitte ergreift selbst für Euch notwendige Maßnahmen, wenn Euer Name, Stimme oder Bild nicht im Video auftauchen sollen (z. B. anonymer Anmeldename und Kamera/Mikrofon ausgeschaltet lassen).

