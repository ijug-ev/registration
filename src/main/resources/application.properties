%cyberland.app.page.webinar.tools=Wir nutzen für Veranstaltungen verschiedene Plattform. Mit Eurer Einwahl in die jeweilige Videokoferenz-Lösung akzeptiert Ihr unsere Datenschutzbedingungen: <a href="${app.tenant.privacy}" target="_blank">${app.tenant.privacy}</a>

